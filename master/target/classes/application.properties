spring.profiles.default=dev
spring.datasource.url=jdbc:mysql://localhost:3306/campus_behavior?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:891878338}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}
spring.redis.database=${REDIS_DATABASE:0}
spring.redis.timeout=2000ms
spring.data.redis.repositories.enabled=false
# Redis Sentinel / Cluster session templates: see docs/examples/redis-session-sentinel.properties.example
# and docs/examples/redis-session-cluster.properties.example

# ===================================================================
# HikariCP ?????
# ===================================================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ===================================================================
# JPA / Hibernate ??
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# ?? View ????????????
spring.jpa.open-in-view=false
spring.session.redis.namespace=campus:session
spring.session.redis.flush-mode=on_save
server.servlet.session.timeout=4h
server.servlet.session.cookie.name=CAMPUS_SESSION
server.servlet.session.cookie.http-only=true

# ===================================================================
# Quartz 调度与持久化
# ===================================================================
# 使用 JDBC JobStore，任务与触发器持久化到 MySQL
spring.quartz.job-store-type=jdbc
spring.quartz.overwrite-existing-jobs=true
spring.quartz.properties.org.quartz.scheduler.instanceName=campusScheduler
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO
spring.quartz.properties.org.quartz.scheduler.skipUpdateCheck=true
spring.quartz.properties.org.quartz.threadPool.threadCount=5
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate
spring.quartz.properties.org.quartz.jobStore.tablePrefix=QRTZ_
spring.quartz.properties.org.quartz.jobStore.useProperties=false
spring.quartz.properties.org.quartz.jobStore.isClustered=true
spring.quartz.properties.org.quartz.jobStore.clusterCheckinInterval=20000
spring.quartz.properties.org.quartz.jobStore.acquireTriggersWithinLock=true
spring.quartz.properties.org.quartz.jobStore.misfireThreshold=60000

# 启动时执行 Quartz 表初始化脚本
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema/mysql/quartz_tables.sql

# ===================================================================
# ????
# ===================================================================
logging.level.root=INFO
logging.level.com.example.bysjdesign=DEBUG
logging.level.org.hibernate.SQL=INFO
logging.pattern.console=[%d{yyyy-MM-dd HH:mm:ss}] [%thread] [%-5level] %logger{36} - %msg%n
spring.application.name=campus-behavior

# ===================================================================
# ????????
# ===================================================================
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024

# ??????
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ===================================================================
# 登录初始化账号
# ===================================================================
app.auth.bootstrap.username=${APP_BOOTSTRAP_USERNAME:\u5f6d\u4e8e\u664f}
app.auth.bootstrap.password=${APP_BOOTSTRAP_PASSWORD:123456}
app.auth.bootstrap.display-name=${APP_BOOTSTRAP_DISPLAY_NAME:\u5f6d\u4e8e\u664f}
app.node.id=${APP_NODE_ID:${HOSTNAME:local-node}}

# Quartz incremental task schedule
app.quartz.analysis.cron=${APP_ANALYSIS_CRON:0 0 * * * ?}
app.quartz.profile.cron=${APP_PROFILE_CRON:0 5 * * * ?}
app.quartz.warning.cron=${APP_WARNING_CRON:0 10 * * * ?}
app.task.retry.max-consecutive-failures=${APP_TASK_RETRY_MAX_CONSECUTIVE_FAILURES:3}
app.task.retry.cooldown-seconds=${APP_TASK_RETRY_COOLDOWN_SECONDS:300}

# Python ML clustering service. Enabled by default; clustering now depends on
# the scikit-learn/PyTorch FastAPI service instead of local Java clustering.
app.ml.cluster.enabled=${APP_ML_CLUSTER_ENABLED:true}
app.ml.cluster.url=${APP_ML_CLUSTER_URL:http://127.0.0.1:8001/cluster}
app.ml.cluster.timeout-ms=${APP_ML_CLUSTER_TIMEOUT_MS:5000}
app.ml.cluster.autoencoder=${APP_ML_CLUSTER_AUTOENCODER:true}
app.ml.cluster.autoencoder-epochs=${APP_ML_CLUSTER_AUTOENCODER_EPOCHS:80}
app.ml.cluster.latent-dim=${APP_ML_CLUSTER_LATENT_DIM:4}
